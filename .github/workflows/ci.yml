name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legalos/backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: legalos
          POSTGRES_PASSWORD: legalos
          POSTGRES_DB: legalos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legalos -d legalos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LEGALOS_TEST_DATABASE_URL: postgresql+asyncpg://legalos:legalos@localhost:5432/legalos_test
      LEGALOS_DATABASE_URL: postgresql+asyncpg://legalos:legalos@localhost:5432/legalos_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: legalos/backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio fakeredis
      - name: Run tests (unit + DB integration)
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legalos/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: legalos/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

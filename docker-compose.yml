version: "3.8"

services:
  # База данных: Граф + Векторы
  neo4j:
    image: neo4j:5.23-community
    container_name: neo4j_uz_legal
    restart: unless-stopped
    ports:
      - "7474:7474" # Веб-интерфейс Neo4j Browser
      - "7687:7687" # Порт для подключения
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_dbms_memory_heap_initial__size=2g
      - NEO4J_dbms_memory_heap_max__size=4g
      - NEO4J_dbms_memory_pagecache_size=2g
      - NEO4J_dbms_security_procedures_unrestricted=genai.*,vector.*
      - NEO4J_dbms_config_vector__index__default__distance__function=COSINE
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - legal_net
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7474",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ваш API сервер (GraphRAG Backend)
  backend:
    build: .
    container_name: legal_api_uz
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - CHUNK_SIZE=${CHUNK_SIZE}
      - LANGUAGE=${LANGUAGE}
    volumes:
      - ./data:/app/data # Сюда класть mehnat_kodeksi_processed.json
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - legal_net
    command: >
      sh -c "sleep 10 && python main.py"

  # Простой чат-интерфейс (Streamlit)
  chat:
    build:
      context: .
      dockerfile: Dockerfile.chat
    container_name: legal_chat_ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./chat:/app
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - legal_net
    command: streamlit run app.py --server.address=0.0.0.0

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  legal_net:
    driver: bridge

# Enterprise LegalOS — full stack
# Usage: cp .env.example .env  →  docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalos}
      POSTGRES_DB: ${POSTGRES_DB:-legalos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-legalos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-legalos-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-legalos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-legalos}
    volumes:
      - rabbitdata:/var/lib/rabbitmq

  backend:
    build: ./backend
    env_file: .env
    environment:
      LEGALOS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-legalos}:${POSTGRES_PASSWORD:-legalos}@postgres:5432/${POSTGRES_DB:-legalos}
      LEGALOS_REDIS_URL: redis://redis:6379/0
      LEGALOS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-legalos}:${RABBITMQ_PASSWORD:-legalos}@rabbitmq:5672/
      LEGALOS_MINIO_ENDPOINT: minio:9000
      LEGALOS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-legalos}
      LEGALOS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-legalos-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: ./backend
    command: python -m app.workers.consumer
    env_file: .env
    environment:
      LEGALOS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-legalos}:${POSTGRES_PASSWORD:-legalos}@postgres:5432/${POSTGRES_DB:-legalos}
      LEGALOS_RABBITMQ_URL: amqp://${RABBITMQ_USER:-legalos}:${RABBITMQ_PASSWORD:-legalos}@rabbitmq:5672/
      LEGALOS_MINIO_ENDPOINT: minio:9000
      LEGALOS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-legalos}
      LEGALOS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-legalos-secret}
    depends_on:
      backend:
        condition: service_started

  frontend:
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  telegram-bot:
    build: ./telegram-bot
    environment:
      LEGALOS_BACKEND_URL: http://backend:8000
      LEGALOS_TELEGRAM_BOT_TOKEN: ${LEGALOS_TELEGRAM_BOT_TOKEN:-}
    depends_on:
      - backend
    profiles: ["telegram"]  # start with: docker compose --profile telegram up

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
  miniodata:
  rabbitdata:
